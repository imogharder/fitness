<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Stats Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Body Stats Tracker</h1>
      <p class="subtitle">Track your measurements and key body ratios over time</p>
    </header>

    <main>
      <!-- Entry Form -->
      <section class="card">
        <h2>New Entry</h2>
        <form id="entry-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" name="date" required />
            </div>
            <div class="form-group">
              <label for="height">Height (cm)</label>
              <input type="number" id="height" name="height" step="0.1" min="0" required />
            </div>
            <div class="form-group">
              <label for="weight">Weight (kg)</label>
              <input type="number" id="weight" name="weight" step="0.1" min="0" required />
            </div>
            <div class="form-group">
              <label for="shoulders">Shoulders (cm)</label>
              <input type="number" id="shoulders" name="shoulders" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="chest">Chest (cm)</label>
              <input type="number" id="chest" name="chest" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="waist">Waist (cm)</label>
              <input type="number" id="waist" name="waist" step="0.1" min="0" required />
            </div>
            <div class="form-group">
              <label for="hips">Hips (cm)</label>
              <input type="number" id="hips" name="hips" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="biceps">Biceps (cm)</label>
              <input type="number" id="biceps" name="biceps" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="forearms">Forearms (cm)</label>
              <input type="number" id="forearms" name="forearms" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="thighs">Thighs (cm)</label>
              <input type="number" id="thighs" name="thighs" step="0.1" min="0" />
            </div>
            <div class="form-group">
              <label for="calves">Calves (cm)</label>
              <input type="number" id="calves" name="calves" step="0.1" min="0" />
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Entry</button>
            <button type="button" id="clear-form" class="btn btn-secondary">Clear</button>
          </div>
        </form>
      </section>

      <!-- Latest Results -->
      <section class="card" id="results-section" hidden>
        <h2>Latest Results</h2>
        <div class="results-grid" id="results-grid">
          <!-- Results injected by JS -->
        </div>
      </section>

      <!-- History -->
      <section class="card">
        <div class="card-header-row">
          <h2>History</h2>
          <button type="button" id="clear-history" class="btn btn-danger">Clear All</button>
        </div>
        <div class="table-wrapper">
          <table id="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Weight</th>
                <th>BMI</th>
                <th>Waist/Height</th>
                <th>Shoulder/Waist</th>
                <th>Chest/Waist</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="history-body">
              <!-- Rows injected by JS -->
            </tbody>
          </table>
        </div>
        <p id="empty-message" class="empty-message">No entries yet. Add your first measurement above.</p>
      </section>
    </main>

    <footer>
      <p>All data is stored locally in your browser.</p>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
